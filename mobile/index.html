<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#EC4899" />
  <title>メルカリ出品ワークスペース（スマホ版）</title>
  <meta name="description" content="写真1枚から、出品に必要なすべてをAIが一気に揃える。選ぶだけで出品準備が完了するスマホ向けウィザード。" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #F1F5F9; -webkit-text-size-adjust: 100%; }
    #root { min-height: 100svh; }
    .boot { min-height: 100svh; display: flex; align-items: center; justify-content: center;
            font-family: system-ui, sans-serif; color: #94A3B8; font-size: 14px; }
  </style>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"><div class="boot">読み込み中…</div></div>

  <script type="text/babel" data-presets="react">
const { useState, useRef, useEffect, useCallback } = React;

// ─── CONSTANTS ────────────────────────────────────────────────
const STEPS = [
  { id: 1, label: "写真", title: "商品の写真を選ぶ" },
  { id: 2, label: "画像生成", title: "AIでイメージ画像を作る" },
  { id: 3, label: "情報確認", title: "出品情報を選んで確認" },
  { id: 4, label: "出品", title: "コピーして出品する" },
];

const QUICK_PROMPTS = [
  { label: "✨ 白背景・高級感", text: "白背景で自然光、高級感あるECサイト風の商品写真を生成して" },
  { label: "🏠 部屋置きイメージ", text: "おしゃれな白い部屋に自然に置いたインテリア雑誌風の写真を生成して" },
  { label: "🌿 ナチュラル", text: "木のテーブルと植物を背景にしたナチュラルなカフェ風の写真を生成して" },
  { label: "👗 コーデ提案", text: "この商品を使ったおしゃれなコーディネートイメージを生成して" },
  { label: "🎁 ギフト風", text: "プレゼントボックスに入れたギフト風のイメージ画像を生成して" },
  { label: "📸 使用シーン", text: "実際に使っているライフスタイルシーンのイメージを生成して" },
];

const MOCK_RESULT = {
  titles: [
    "NIKE エアマックス 90 26cm 美品 箱付き 即購入OK",
    "【美品】ナイキ Air Max 90 ホワイト 26cm 箱あり",
    "NIKE エアマックス90 白 26cm 3回着用 即発送",
  ],
  prices: [
    { label: "即売れ重視", price: "2,980", note: "24時間以内に売れやすい" },
    { label: "バランス型", price: "3,500", note: "3〜5日が目安", rec: true },
    { label: "利益重視", price: "4,200", note: "値引き交渉の余地あり" },
  ],
  description: `美品のNIKEスニーカーです。購入後3回ほど使用しました。目立つ傷や汚れはなく、とても綺麗な状態です。

【商品詳細】
・ブランド：NIKE（ナイキ）
・商品名：エアマックス 90
・サイズ：26cm（US8）
・状態：美品（使用感ほぼなし）
・付属品：純正箱あり

即購入OK・匿名配送予定です。`,
  hashtags: "#NIKE #ナイキ #エアマックス #スニーカー #美品 #即購入OK #26cm",
};

const IMAGE_STYLES = [
  { gradient: "linear-gradient(135deg, #f8f9fa, #dee2e6)", emoji: "👟", label: "白背景・高級感" },
  { gradient: "linear-gradient(135deg, #fff3e0, #ffe0b2)", emoji: "🌿", label: "ナチュラル" },
  { gradient: "linear-gradient(135deg, #e8f5e9, #c8e6c9)", emoji: "🏠", label: "インテリア" },
  { gradient: "linear-gradient(135deg, #fce4ec, #f8bbd0)", emoji: "🎁", label: "ギフト風" },
];

// ─── UTILITIES ────────────────────────────────────────────────
const now = () => new Date().toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" });

function useCopy(text) {
  const [copied, setCopied] = useState(false);
  const copy = useCallback(async () => {
    try { await navigator.clipboard.writeText(text); setCopied(true); setTimeout(() => setCopied(false), 2000); } catch {}
  }, [text]);
  return [copied, copy];
}

// ─── PROGRESS BAR ────────────────────────────────────────────
function ProgressBar({ step }) {
  return (
    <div style={{ padding: "14px 20px 0" }}>
      <div style={{ display: "flex", alignItems: "center" }}>
        {STEPS.map((s, i) => (
          <div key={s.id} style={{ display: "flex", alignItems: "center", flex: i < STEPS.length - 1 ? 1 : 0 }}>
            <div style={{
              width: 26, height: 26, borderRadius: "50%", flexShrink: 0,
              display: "flex", alignItems: "center", justifyContent: "center",
              fontSize: step > s.id ? 12 : 11, fontWeight: 700,
              background: step > s.id ? "#10B981" : step === s.id ? "#EC4899" : "#E2E8F0",
              color: step >= s.id ? "#fff" : "#94A3B8",
              transition: "all 0.3s",
              boxShadow: step === s.id ? "0 0 0 3px rgba(236,72,153,0.18)" : "none",
            }}>
              {step > s.id ? "✓" : s.id}
            </div>
            {i < STEPS.length - 1 && (
              <div style={{
                flex: 1, height: 2, margin: "0 3px",
                background: step > s.id ? "#10B981" : "#E2E8F0",
                transition: "background 0.4s",
              }} />
            )}
          </div>
        ))}
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", marginTop: 6 }}>
        {STEPS.map(s => (
          <div key={s.id} style={{
            fontSize: 9, fontWeight: step === s.id ? 700 : 400, textAlign: "center",
            color: step === s.id ? "#EC4899" : step > s.id ? "#10B981" : "#94A3B8",
          }}>{s.label}</div>
        ))}
      </div>
    </div>
  );
}

// ─── STEP 1 ───────────────────────────────────────────────────
function Step1({ onNext }) {
  const [images, setImages] = useState([]);
  const [drag, setDrag] = useState(false);
  const inputRef = useRef();
  const addFiles = (files) => {
    const urls = Array.from(files).filter(f => f.type.startsWith("image/")).map(f => URL.createObjectURL(f));
    setImages(p => [...p, ...urls].slice(0, 4));
  };
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
      <div
        onDragOver={e => { e.preventDefault(); setDrag(true); }}
        onDragLeave={() => setDrag(false)}
        onDrop={e => { e.preventDefault(); setDrag(false); addFiles(e.dataTransfer.files); }}
        onClick={() => inputRef.current?.click()}
        style={{
          border: `2px dashed ${drag ? "#EC4899" : "#E2E8F0"}`,
          borderRadius: 16, padding: "28px 20px",
          display: "flex", flexDirection: "column", alignItems: "center", gap: 10,
          cursor: "pointer", background: drag ? "#FFF0F7" : "#FAFBFC", transition: "all 0.2s",
        }}
      >
        <div style={{ fontSize: 36 }}>📷</div>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 14, fontWeight: 600, color: "#1E293B" }}>写真をドロップ</div>
          <div style={{ fontSize: 12, color: "#94A3B8", marginTop: 3 }}>またはタップして選択（最大4枚）</div>
        </div>
        <div style={{ padding: "8px 20px", borderRadius: 99, background: "#EC4899", color: "#fff", fontSize: 13, fontWeight: 600 }}>
          写真を選ぶ / カメラで撮影
        </div>
        <input ref={inputRef} type="file" accept="image/*" multiple capture="environment" style={{ display: "none" }} onChange={e => addFiles(e.target.files)} />
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
        {images.length > 0
          ? images.map((src, i) => (
            <div key={i} style={{ aspectRatio: "1", borderRadius: 12, overflow: "hidden", background: "#F1F5F9", position: "relative" }}>
              <img src={src} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} />
              {i === 0 && <div style={{ position: "absolute", bottom: 4, left: 4, background: "#EC4899", color: "#fff", fontSize: 9, padding: "2px 6px", borderRadius: 99, fontWeight: 700 }}>メイン</div>}
            </div>
          ))
          : ["👟 商品写真", "📦 箱・付属品", "🏷️ タグ・ブランド", "🔍 状態確認"].map((t, i) => (
            <div key={i} style={{ aspectRatio: "1", borderRadius: 12, background: "#F8FAFC", border: "1.5px solid #E2E8F0", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 4 }}>
              <div style={{ fontSize: 28, opacity: 0.3 }}>{t.split(" ")[0]}</div>
              <div style={{ fontSize: 9, color: "#CBD5E1" }}>{t.split(" ")[1]}</div>
            </div>
          ))
        }
      </div>

      <button onClick={onNext} style={{
        width: "100%", padding: "14px", borderRadius: 14,
        background: "linear-gradient(135deg, #EC4899, #F43F5E)",
        color: "#fff", fontSize: 15, fontWeight: 700, border: "none", cursor: "pointer",
        boxShadow: "0 4px 14px rgba(236,72,153,0.28)",
        display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
      }}>
        ✨ 次へ：AIでイメージ画像を作る
      </button>
    </div>
  );
}

// ─── STEP 2: IMAGE CHAT ───────────────────────────────────────
function Step2({ onNext }) {
  const [messages, setMessages] = useState([{
    role: "ai", time: now(),
    text: "商品のメルカリ映えするイメージ画像を作りましょう！🎨\n\nどんな雰囲気にしたいか教えてください。下のボタンから選ぶか、自由に入力してもOKです。",
  }]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [selected, setSelected] = useState([]);
  const bottomRef = useRef();

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, loading]);

  const send = async (text) => {
    const t = text || input.trim();
    if (!t || loading) return;
    setInput("");
    setMessages(p => [...p, { role: "user", time: now(), text: t }]);
    setLoading(true);
    await new Promise(r => setTimeout(r, 2000));

    const msgId = `msg-${Date.now()}`;
    const imgs = IMAGE_STYLES.map((s, i) => ({ ...s, id: `${msgId}-${i}` }));

    setMessages(p => [...p, {
      role: "ai", time: now(), msgId,
      text: `「${t.slice(0, 18)}…」のイメージで4パターン生成しました！\n気に入ったものをタップして選んでください。`,
      images: imgs,
    }]);
    setLoading(false);
  };

  const toggleImg = (msgId, imgId) => {
    setMessages(prev => prev.map(m => {
      if (m.msgId !== msgId) return m;
      return { ...m, images: m.images.map(img => ({ ...img, selected: img.id === imgId ? !img.selected : img.selected })) };
    }));
    setSelected(prev => prev.includes(imgId) ? prev.filter(id => id !== imgId) : [...prev, imgId]);
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
      {selected.length > 0 && (
        <div style={{ background: "#FFF0F7", border: "1.5px solid #FCA5A5", borderRadius: 12, padding: "10px 14px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div style={{ fontSize: 12, color: "#BE185D", fontWeight: 600 }}>📌 {selected.length}枚選択中</div>
          <button onClick={onNext} style={{ padding: "6px 14px", borderRadius: 99, background: "linear-gradient(135deg,#EC4899,#F43F5E)", color: "#fff", fontSize: 12, fontWeight: 700, border: "none", cursor: "pointer" }}>
            次のステップへ →
          </button>
        </div>
      )}

      {/* Chat */}
      <div style={{ maxHeight: 300, overflowY: "auto", display: "flex", flexDirection: "column" }}>
        {messages.map((msg, i) => {
          const isUser = msg.role === "user";
          return (
            <div key={i} style={{ marginBottom: 10 }}>
              {!isUser && (
                <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>
                  <div style={{ width: 24, height: 24, borderRadius: "50%", background: "linear-gradient(135deg,#EC4899,#F43F5E)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12 }}>🤖</div>
                  <span style={{ fontSize: 10, color: "#94A3B8", fontWeight: 600 }}>メルカリAI</span>
                  <span style={{ fontSize: 10, color: "#CBD5E1" }}>{msg.time}</span>
                </div>
              )}
              {msg.text && (
                <div style={{
                  maxWidth: "85%", padding: "9px 13px",
                  borderRadius: isUser ? "14px 14px 4px 14px" : "4px 14px 14px 14px",
                  background: isUser ? "linear-gradient(135deg,#EC4899,#F43F5E)" : "#F1F5F9",
                  color: isUser ? "#fff" : "#1E293B", fontSize: 12, lineHeight: 1.6,
                  marginLeft: isUser ? "auto" : 0, whiteSpace: "pre-wrap",
                }}>
                  {msg.text}
                </div>
              )}
              {msg.images && (
                <div style={{ marginTop: 8 }}>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
                    {msg.images.map(img => (
                      <div key={img.id} onClick={() => toggleImg(msg.msgId, img.id)} style={{
                        aspectRatio: "1", borderRadius: 10, background: img.gradient,
                        display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
                        gap: 4, cursor: "pointer", position: "relative",
                        border: `2px solid ${img.selected ? "#EC4899" : "transparent"}`,
                        boxShadow: img.selected ? "0 0 0 3px rgba(236,72,153,0.18)" : "0 2px 6px rgba(0,0,0,0.08)",
                        transition: "all 0.2s",
                      }}>
                        <div style={{ fontSize: 28, opacity: 0.5 }}>{img.emoji}</div>
                        <div style={{ fontSize: 9, color: "#64748B" }}>{img.label}</div>
                        {img.selected && (
                          <div style={{ position: "absolute", top: 5, right: 5, width: 18, height: 18, borderRadius: "50%", background: "#EC4899", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, color: "#fff", fontWeight: 700 }}>✓</div>
                        )}
                      </div>
                    ))}
                  </div>
                  <div style={{ fontSize: 10, color: "#94A3B8", marginTop: 5 }}>💡 タップして選択 · 複数選択OK</div>
                </div>
              )}
              {isUser && <div style={{ fontSize: 10, color: "#CBD5E1", textAlign: "right", marginTop: 3 }}>{msg.time}</div>}
            </div>
          );
        })}
        {loading && (
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
            <div style={{ width: 24, height: 24, borderRadius: "50%", background: "linear-gradient(135deg,#EC4899,#F43F5E)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12 }}>🤖</div>
            <div style={{ background: "#F1F5F9", borderRadius: "4px 14px 14px 14px", padding: "10px 14px", display: "flex", gap: 4 }}>
              {[0,1,2].map(i => (
                <div key={i} style={{ width: 6, height: 6, borderRadius: "50%", background: "#EC4899", animation: `b 1.2s ${i*0.2}s infinite` }} />
              ))}
              <style>{`@keyframes b{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}`}</style>
            </div>
          </div>
        )}
        <div ref={bottomRef} />
      </div>

      {/* Quick prompts */}
      <div style={{ display: "flex", gap: 5, overflowX: "auto", paddingBottom: 2, scrollbarWidth: "none" }}>
        {QUICK_PROMPTS.map((p, i) => (
          <button key={i} onClick={() => send(p.text)} disabled={loading} style={{
            flexShrink: 0, padding: "5px 10px", borderRadius: 99,
            background: "#F8FAFC", border: "1.5px solid #E2E8F0",
            fontSize: 10, fontWeight: 500, color: "#475569",
            cursor: loading ? "not-allowed" : "pointer", whiteSpace: "nowrap",
            opacity: loading ? 0.5 : 1,
          }}>{p.label}</button>
        ))}
      </div>

      {/* Input */}
      <div style={{ display: "flex", gap: 8, alignItems: "flex-end", background: "#F8FAFC", borderRadius: 14, padding: "8px 8px 8px 14px", border: "1.5px solid #E2E8F0" }}>
        <textarea value={input} onChange={e => setInput(e.target.value)}
          onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }}
          placeholder="どんな画像を作りたいか入力…" disabled={loading} rows={2}
          style={{ flex: 1, border: "none", background: "transparent", fontSize: 13, color: "#1E293B", resize: "none", outline: "none", fontFamily: "inherit", lineHeight: 1.5 }}
        />
        <button onClick={() => send()} disabled={!input.trim() || loading} style={{
          width: 34, height: 34, borderRadius: "50%", border: "none", flexShrink: 0,
          background: input.trim() && !loading ? "linear-gradient(135deg,#EC4899,#F43F5E)" : "#E2E8F0",
          color: input.trim() && !loading ? "#fff" : "#94A3B8",
          cursor: input.trim() && !loading ? "pointer" : "not-allowed",
          fontSize: 15, display: "flex", alignItems: "center", justifyContent: "center",
          transition: "all 0.2s",
        }}>↑</button>
      </div>

      <button onClick={onNext} style={{ width: "100%", padding: "11px", borderRadius: 12, background: "transparent", color: "#94A3B8", fontSize: 12, fontWeight: 500, border: "1.5px solid #E2E8F0", cursor: "pointer" }}>
        スキップして次へ（商品情報の確認へ）→
      </button>
    </div>
  );
}

// ─── STEP 3 ───────────────────────────────────────────────────
function Step3({ onNext, setFinal }) {
  const [titleIdx, setTitleIdx] = useState(1);
  const [priceIdx, setPriceIdx] = useState(1);
  const [desc, setDesc] = useState(MOCK_RESULT.description);
  const confirm = () => {
    setFinal({ title: MOCK_RESULT.titles[titleIdx], price: MOCK_RESULT.prices[priceIdx].price, description: desc, hashtags: MOCK_RESULT.hashtags });
    onNext();
  };
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
      <div>
        <div style={{ fontSize: 11, fontWeight: 600, color: "#64748B", marginBottom: 7 }}>📝 タイトルを選ぶ</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
          {MOCK_RESULT.titles.map((t, i) => (
            <button key={i} onClick={() => setTitleIdx(i)} style={{
              padding: "9px 12px", borderRadius: 10, border: `1.5px solid ${titleIdx===i?"#EC4899":"#E2E8F0"}`,
              background: titleIdx===i?"#FFF0F7":"#F8FAFC", textAlign: "left",
              fontSize: 12, color: titleIdx===i?"#BE185D":"#475569", fontWeight: titleIdx===i?600:400,
              cursor: "pointer", lineHeight: 1.5, transition: "all 0.2s",
            }}>
              <span style={{ fontSize: 10, color: titleIdx===i?"#EC4899":"#94A3B8", marginRight: 5 }}>案{i+1}</span>{t}
              {titleIdx===i && <span style={{ float: "right" }}>✓</span>}
            </button>
          ))}
        </div>
      </div>
      <div>
        <div style={{ fontSize: 11, fontWeight: 600, color: "#64748B", marginBottom: 7 }}>💰 価格を選ぶ</div>
        <div style={{ display: "flex", gap: 6 }}>
          {MOCK_RESULT.prices.map((p, i) => (
            <button key={i} onClick={() => setPriceIdx(i)} style={{
              flex: 1, padding: "10px 6px", borderRadius: 10, border: `1.5px solid ${priceIdx===i?"#EC4899":"#E2E8F0"}`,
              background: priceIdx===i?"#FFF0F7":"#F8FAFC", cursor: "pointer", position: "relative", transition: "all 0.2s",
            }}>
              {p.rec && <div style={{ position: "absolute", top: -8, left: "50%", transform: "translateX(-50%)", background: "#EC4899", color: "#fff", fontSize: 8, padding: "2px 5px", borderRadius: 99, fontWeight: 700, whiteSpace: "nowrap" }}>おすすめ</div>}
              <div style={{ fontSize: 9, color: priceIdx===i?"#EC4899":"#94A3B8", marginBottom: 2 }}>{p.label}</div>
              <div style={{ fontSize: 15, fontWeight: 700, color: priceIdx===i?"#BE185D":"#1E293B" }}>¥{p.price}</div>
              <div style={{ fontSize: 9, color: "#94A3B8", marginTop: 2, lineHeight: 1.3 }}>{p.note}</div>
            </button>
          ))}
        </div>
      </div>
      <div>
        <div style={{ fontSize: 11, fontWeight: 600, color: "#64748B", marginBottom: 7 }}>✏️ 説明文を確認・編集</div>
        <textarea value={desc} onChange={e => setDesc(e.target.value)} rows={6} style={{ width: "100%", padding: "10px 12px", borderRadius: 10, border: "1.5px solid #E2E8F0", fontSize: 12, color: "#334155", lineHeight: 1.6, resize: "vertical", fontFamily: "inherit", background: "#FAFBFC", outline: "none" }} />
      </div>
      <button onClick={confirm} style={{ width: "100%", padding: "14px", borderRadius: 14, background: "linear-gradient(135deg,#EC4899,#F43F5E)", color: "#fff", fontSize: 14, fontWeight: 700, border: "none", cursor: "pointer", boxShadow: "0 4px 14px rgba(236,72,153,0.28)" }}>
        → 出品準備する
      </button>
    </div>
  );
}

// ─── STEP 4 ───────────────────────────────────────────────────
function Step4({ final, onRestart }) {
  const f = final || { title: MOCK_RESULT.titles[1], price: "3,500", description: MOCK_RESULT.description, hashtags: MOCK_RESULT.hashtags };
  const allText = `【商品名】\n${f.title}\n\n【説明文】\n${f.description}\n\n【価格】\n${f.price}円\n\n【ハッシュタグ】\n${f.hashtags}`;
  const [allCopied, copyAll] = useCopy(allText);
  const [tc, ct] = useCopy(f.title);
  const [pc, cp] = useCopy(f.price);
  const [dc, cd] = useCopy(f.description);
  const [hc, ch] = useCopy(f.hashtags);
  const fields = [
    { label: "商品タイトル", value: f.title, copied: tc, copy: ct },
    { label: "価格（円）", value: `¥${f.price}`, copied: pc, copy: cp },
    { label: "説明文", value: f.description, copied: dc, copy: cd, multi: true },
    { label: "ハッシュタグ", value: f.hashtags, copied: hc, copy: ch },
  ];
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
      <div style={{ padding: "12px 14px", borderRadius: 14, background: "linear-gradient(135deg,#FFF0F7,#FFF1F2)", border: "1.5px solid #FCA5A5", display: "flex", alignItems: "center", gap: 10 }}>
        <div style={{ fontSize: 28 }}>🎉</div>
        <div>
          <div style={{ fontSize: 14, fontWeight: 700, color: "#BE185D" }}>出品準備完了！</div>
          <div style={{ fontSize: 11, color: "#94A3B8", marginTop: 1 }}>コピーしてメルカリに貼るだけ</div>
        </div>
      </div>
      {fields.map((f, i) => (
        <div key={i} style={{ borderRadius: 12, overflow: "hidden", border: "1.5px solid #E2E8F0" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "7px 12px", background: "#F8FAFC", borderBottom: "1px solid #E2E8F0" }}>
            <span style={{ fontSize: 11, fontWeight: 600, color: "#64748B" }}>{f.label}</span>
            <button onClick={f.copy} style={{ padding: "3px 9px", borderRadius: 99, border: `1px solid ${f.copied?"#86EFAC":"#E2E8F0"}`, background: f.copied?"#D1FAE5":"#fff", color: f.copied?"#059669":"#64748B", fontSize: 11, fontWeight: 600, cursor: "pointer", transition: "all 0.2s" }}>
              {f.copied ? "✓ 済" : "⎘ コピー"}
            </button>
          </div>
          <div style={{ padding: "8px 12px", fontSize: 12, color: "#334155", lineHeight: 1.6, whiteSpace: f.multi?"pre-wrap":"nowrap", overflow: "hidden", textOverflow: f.multi?"clip":"ellipsis", maxHeight: f.multi?72:undefined, overflowY: f.multi?"auto":undefined }}>
            {f.value}
          </div>
        </div>
      ))}
      <button onClick={copyAll} style={{ width: "100%", padding: "15px", borderRadius: 14, background: allCopied?"linear-gradient(135deg,#10B981,#059669)":"linear-gradient(135deg,#1E293B,#334155)", color: "#fff", fontSize: 14, fontWeight: 700, border: "none", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8, transition: "all 0.3s", boxShadow: "0 4px 14px rgba(0,0,0,0.15)" }}>
        <span>{allCopied?"✓":"⎘"}</span>{allCopied?"コピーしました！":"全部まとめてコピー"}
      </button>
      <a href="https://jp.mercari.com/sell" target="_blank" rel="noreferrer" style={{ width: "100%", padding: "13px", borderRadius: 14, background: "#FFF0F7", color: "#EC4899", fontSize: 13, fontWeight: 700, border: "1.5px solid #FCA5A5", display: "flex", alignItems: "center", justifyContent: "center", gap: 8, textDecoration: "none" }}>
        🛍 メルカリの出品ページを開く ↗
      </a>
      <button onClick={onRestart} style={{ width: "100%", padding: "11px", borderRadius: 12, background: "transparent", color: "#94A3B8", fontSize: 12, fontWeight: 500, border: "1.5px solid #E2E8F0", cursor: "pointer" }}>
        ↩ 別の商品を出品する
      </button>
    </div>
  );
}

// ─── MAIN ────────────────────────────────────────────────────
function MercariWizardFull() {
  const [step, setStep] = useState(1);
  const [final, setFinal] = useState(null);
  const next = () => setStep(s => Math.min(s + 1, 4));
  const prev = () => setStep(s => Math.max(s - 1, 1));
  const restart = () => { setStep(1); setFinal(null); };

  return (
    <div style={{ minHeight: "100vh", background: "#F1F5F9", display: "flex", alignItems: "flex-start", justifyContent: "center", padding: "16px", fontFamily: "'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif" }}>
      <div style={{ width: "100%", maxWidth: 400 }}>
        {/* Header */}
        <div style={{ background: "#fff", borderRadius: "20px 20px 0 0", boxShadow: "0 1px 0 #E2E8F0" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "14px 20px 6px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              {step > 1 && step < 4 && (
                <button onClick={prev} style={{ width: 30, height: 30, borderRadius: "50%", border: "none", background: "#F1F5F9", cursor: "pointer", fontSize: 14, color: "#64748B", display: "flex", alignItems: "center", justifyContent: "center" }}>←</button>
              )}
              <div>
                <div style={{ fontSize: 15, fontWeight: 700, color: "#1E293B" }}>{STEPS[step-1].title}</div>
                <div style={{ fontSize: 10, color: "#94A3B8" }}>STEP {step} / 4</div>
              </div>
            </div>
            <div style={{ fontSize: 9, fontWeight: 600, padding: "4px 10px", borderRadius: 99, background: "#FFF0F7", color: "#EC4899" }}>メルカリAI出品</div>
          </div>
          <ProgressBar step={step} />
        </div>

        {/* Content */}
        <div style={{ background: "#fff", padding: 18, borderRadius: "0 0 20px 20px", boxShadow: "0 6px 24px rgba(0,0,0,0.07)" }}>
          {step === 1 && <Step1 onNext={next} />}
          {step === 2 && <Step2 onNext={next} />}
          {step === 3 && <Step3 onNext={next} setFinal={setFinal} />}
          {step === 4 && <Step4 final={final} onRestart={restart} />}
        </div>

        <div style={{ textAlign: "center", padding: "10px 0", fontSize: 10, color: "#CBD5E1" }}>
          🤖 Powered by Claude AI × DALL-E 3
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<MercariWizardFull />);
  </script>
</body>
</html>
