<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#2563eb" />
  <title>メルカリ出品ワークスペース（PC版・4ペイン）</title>
  <meta name="description" content="写真1枚から、出品に必要なすべてをAIが一気に揃える。PC向けの4ペイン・ワークスペース。" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #f1f5f9; -webkit-text-size-adjust: 100%; }
    .boot { min-height: 100svh; display: flex; align-items: center; justify-content: center;
            font-family: system-ui, sans-serif; color: #94A3B8; font-size: 14px; }
    .page-wrap { max-width: 1200px; margin: 0 auto; padding: 16px; }
    .page-head { font-family: system-ui, sans-serif; padding: 4px 4px 12px; }
    .page-head h1 { font-size: 16px; font-weight: 700; color: #1e293b; margin: 0; }
    .page-head p { font-size: 12px; color: #64748b; margin: 4px 0 0; }
    .page-head a { color: #2563eb; text-decoration: none; font-weight: 600; }
    .frame { border-radius: 14px; overflow: hidden; box-shadow: 0 8px 30px rgba(0,0,0,0.08); background: #fff; }
    @media (max-width: 720px) {
      .mobile-hint { display: block; }
    }
    .mobile-hint { display: none; font-family: system-ui, sans-serif; font-size: 12px;
            color: #92400e; background: #fffbeb; border: 1px solid #fde68a;
            border-radius: 10px; padding: 10px 12px; margin: 0 4px 12px; }
    .mobile-hint a { color: #b45309; font-weight: 700; }
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div class="page-wrap">
    <div class="page-head">
      <h1>🛒 メルカリ出品ワークスペース <span style="font-weight:400;color:#94a3b8;">PC版（4ペイン）</span></h1>
      <p>写真1枚から、出品に必要なすべてをAIが揃える。 ／ スマホの方は <a href="../mobile/">スマホ版はこちら →</a></p>
    </div>
    <div class="mobile-hint">
      📱 この画面は横長のPC向けです。スマートフォンでは <a href="../mobile/">スマホ版（ウィザード）</a> の方が使いやすいです。
    </div>
    <div class="frame">
      <div id="root"><div class="boot">読み込み中…</div></div>
    </div>
  </div>

  <script type="text/babel" data-presets="react">
const { useState, useRef, useCallback, useEffect } = React;

// ─── DEMO DATA ───────────────────────────────────────────────
const MOCK_AI_RESULT = {
  titles: [
    "NIKE エアマックス 90 スニーカー 26cm 美品 箱付き 即購入OK",
    "【美品】ナイキ Air Max 90 ホワイト 26cm 箱あり 送料込",
    "NIKE エアマックス90 白 26cm 3回着用 即発送 匿名配送",
  ],
  description: `美品のNIKEスニーカーです。購入後3回ほど使用しました。
目立つ傷や汚れはなく、とても綺麗な状態です。

【商品詳細】
・ブランド：NIKE（ナイキ）
・商品名：エアマックス 90
・サイズ：26cm（US8）
・カラー：ホワイト×グレー
・状態：美品（使用感ほぼなし）
・付属品：純正箱あり、タグあり

【発送について】
・匿名配送予定（らくらくメルカリ便）
・梱包は丁寧に行います
・即購入OK・値下げ交渉もお気軽に

ご不明な点はお気軽にコメントください。`,
  prices: [
    { label: "即売れ重視", price: "2980", note: "相場より-15%。出品後24h以内に売れやすい" },
    { label: "バランス型", price: "3500", note: "相場通り。3〜5日で売れる目安", recommended: true },
    { label: "利益重視", price: "4200", note: "相場より+20%。値引き交渉の余地あり" },
  ],
  hashtags: "#NIKE #ナイキ #エアマックス #エアマックス90 #スニーカー #Nike #靴 #メンズスニーカー #美品 #即購入OK #26cm #ホワイト",
};

const QUICK_PROMPTS = [
  { label: "✨ 白背景・高級感", text: "白背景で自然光が当たった高級感あるECサイト風の商品写真を生成して" },
  { label: "🏠 部屋置き", text: "おしゃれな白い部屋に自然に置いたインテリア雑誌風の写真を生成して" },
  { label: "🌿 ナチュラル", text: "木のテーブルと植物を背景にしたナチュラルなカフェ風の写真を生成して" },
  { label: "👗 コーデ", text: "この商品を使ったおしゃれなコーディネートイメージを生成して" },
  { label: "🎁 ギフト風", text: "プレゼントボックスに入れたギフト風のイメージ画像を生成して" },
  { label: "📸 使用シーン", text: "実際に使っているライフスタイルシーンのイメージを生成して" },
];

const IMAGE_STYLES = [
  { gradient: "linear-gradient(135deg,#f8f9fa,#dee2e6)", emoji: "👟", label: "白背景・高級感", bg: "#EEF2FF" },
  { gradient: "linear-gradient(135deg,#fff3e0,#ffe0b2)", emoji: "🌿", label: "ナチュラル", bg: "#F0FDF4" },
  { gradient: "linear-gradient(135deg,#e8f5e9,#c8e6c9)", emoji: "🏠", label: "インテリア", bg: "#FFF7ED" },
  { gradient: "linear-gradient(135deg,#fce4ec,#f8bbd0)", emoji: "🎁", label: "ギフト風", bg: "#FFF1F2" },
  { gradient: "linear-gradient(135deg,#e3f2fd,#bbdefb)", emoji: "📸", label: "スタジオ風", bg: "#F5F3FF" },
  { gradient: "linear-gradient(135deg,#f3e5f5,#e1bee7)", emoji: "✨", label: "高級・ラグジュアリー", bg: "#FAFAF0" },
];

const nowStr = () => new Date().toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" });

// ─── UTILITIES ────────────────────────────────────────────────
function useCopy(text) {
  const [copied, setCopied] = useState(false);
  const copy = useCallback(async () => {
    try { await navigator.clipboard.writeText(text); setCopied(true); setTimeout(() => setCopied(false), 2000); } catch {}
  }, [text]);
  return [copied, copy];
}

function PaneHeader({ num, color, title, subtitle }) {
  const colors = {
    blue:  { bg: "bg-blue-500",  ring: "ring-blue-200",  text: "text-blue-50" },
    pink:  { bg: "bg-pink-500",  ring: "ring-pink-200",  text: "text-pink-50" },
    amber: { bg: "bg-amber-500", ring: "ring-amber-200", text: "text-amber-50" },
    rose:  { bg: "bg-rose-500",  ring: "ring-rose-200",  text: "text-rose-50" },
  };
  const c = colors[color];
  return (
    <div className="flex items-center gap-2.5 px-3 py-2.5 border-b border-zinc-100 bg-white shrink-0">
      <div className={`w-6 h-6 rounded-full ${c.bg} ring-2 ${c.ring} flex items-center justify-center text-xs font-bold ${c.text} shrink-0`}>{num}</div>
      <div className="min-w-0">
        <div className="text-xs font-semibold text-zinc-800 leading-tight">{title}</div>
        <div className="text-[10px] text-zinc-400 leading-tight">{subtitle}</div>
      </div>
    </div>
  );
}

// ─── PANE 1: 画像アップロード ─────────────────────────────────
function PaneOne({ onAnalyze, analyzing }) {
  const [images, setImages] = useState([]);
  const [dragging, setDragging] = useState(false);
  const inputRef = useRef();
  const addFiles = (files) => {
    const urls = Array.from(files).filter(f => f.type.startsWith("image/")).map(f => URL.createObjectURL(f));
    setImages(prev => [...prev, ...urls].slice(0, 6));
  };
  return (
    <div className="flex flex-col h-full">
      <PaneHeader num="①" color="blue" title="画像アップロード" subtitle="商品写真をここに追加" />
      <div className="flex-1 flex flex-col gap-3 p-3 overflow-auto">
        <div
          onDragOver={e => { e.preventDefault(); setDragging(true); }}
          onDragLeave={() => setDragging(false)}
          onDrop={e => { e.preventDefault(); setDragging(false); addFiles(e.dataTransfer.files); }}
          onClick={() => inputRef.current?.click()}
          className={`border-2 border-dashed rounded-xl flex flex-col items-center justify-center gap-2 cursor-pointer transition-all py-5 ${dragging ? "border-blue-400 bg-blue-50" : "border-zinc-200 hover:border-zinc-300 hover:bg-zinc-50"}`}
        >
          <span className="text-3xl">📷</span>
          <div className="text-center">
            <div className="text-xs font-medium text-zinc-600">ドロップ or タップして選択</div>
            <div className="text-[10px] text-zinc-400 mt-0.5">JPG・PNG・最大6枚</div>
          </div>
          <input ref={inputRef} type="file" accept="image/*" multiple className="hidden" onChange={e => addFiles(e.target.files)} />
        </div>
        {images.length > 0 ? (
          <div className="grid grid-cols-3 gap-1.5">
            {images.map((src, i) => (
              <div key={i} className="relative aspect-square rounded-lg overflow-hidden bg-zinc-100 group">
                <img src={src} alt="" className="w-full h-full object-cover" />
                <button onClick={() => setImages(p => p.filter((_, j) => j !== i))} className="absolute top-1 right-1 w-5 h-5 rounded-full bg-black/50 text-white text-xs flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">×</button>
                {i === 0 && <span className="absolute bottom-1 left-1 text-[9px] font-bold bg-blue-500 text-white px-1.5 py-0.5 rounded">メイン</span>}
              </div>
            ))}
          </div>
        ) : (
          <div className="grid grid-cols-3 gap-1.5 opacity-30">
            {["👟","👟","📦","🏷","🔍","📐"].map((e, i) => (
              <div key={i} className="aspect-square rounded-lg bg-zinc-100 flex items-center justify-center text-2xl">{e}</div>
            ))}
          </div>
        )}
        <div className="text-[10px] text-zinc-400 text-center">サンプル画像（実際は選択した写真が表示されます）</div>
        <button
          onClick={onAnalyze} disabled={analyzing}
          className={`w-full py-3 rounded-xl font-semibold text-sm flex items-center justify-center gap-2 transition-all ${analyzing ? "bg-blue-400 text-white cursor-wait" : "bg-blue-600 text-white hover:bg-blue-700 active:scale-[0.98]"}`}
        >
          {analyzing ? <><span className="animate-spin">⟳</span><span>AI解析中...</span></> : <><span>✨</span><span>OK — AIで解析する</span></>}
        </button>
      </div>
    </div>
  );
}

// ─── PANE 2: 画像生成チャット ─────────────────────────────────
function PaneTwo({ onImagesGenerated }) {
  const [messages, setMessages] = useState([{
    role: "ai", time: nowStr(),
    text: "メルカリ映えするイメージ画像を作りましょう！🎨\n\nどんな雰囲気の画像にしたいか教えてください。",
  }]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [selectedIds, setSelectedIds] = useState([]);
  const bottomRef = useRef();

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, loading]);

  const send = async (text) => {
    const t = text || input.trim();
    if (!t || loading) return;
    setInput("");
    setMessages(p => [...p, { role: "user", time: nowStr(), text: t }]);
    setLoading(true);
    await new Promise(r => setTimeout(r, 1800));
    const msgId = `m${Date.now()}`;
    const imgs = IMAGE_STYLES.map((s, i) => ({ ...s, id: `${msgId}-${i}` }));
    setMessages(p => [...p, {
      role: "ai", time: nowStr(), msgId,
      text: `「${t.slice(0, 15)}…」で6パターン生成しました✨\n気に入ったものをクリックして選んでください。`,
      images: imgs,
    }]);
    setLoading(false);
  };

  const toggleImg = (msgId, imgId, imgData) => {
    setMessages(prev => prev.map(m => m.msgId !== msgId ? m : {
      ...m, images: m.images.map(img => ({ ...img, selected: img.id === imgId ? !img.selected : img.selected }))
    }));
    setSelectedIds(prev => {
      const next = prev.includes(imgId) ? prev.filter(id => id !== imgId) : [...prev, imgId];
      const allMsgs = messages;
      const allImgs = allMsgs.flatMap(m => m.images || []);
      onImagesGenerated && onImagesGenerated(
        [...allImgs.filter(img => next.includes(img.id)), imgData].filter(Boolean)
          .filter((v, i, a) => a.findIndex(x => x.id === v.id) === i)
      );
      return next;
    });
  };

  return (
    <div className="flex flex-col h-full">
      <PaneHeader num="②" color="pink" title="AIイメージ画像生成" subtitle="チャットで画像のイメージを指示" />

      {selectedIds.length > 0 && (
        <div className="mx-3 mt-2 px-3 py-1.5 bg-pink-50 border border-pink-200 rounded-lg flex items-center justify-between shrink-0">
          <span className="text-[11px] text-pink-600 font-semibold">📌 {selectedIds.length}枚選択中 → ③に反映済</span>
          <button onClick={() => { setSelectedIds([]); setMessages(p => p.map(m => m.images ? { ...m, images: m.images.map(img => ({ ...img, selected: false })) } : m)); onImagesGenerated && onImagesGenerated([]); }}
            className="text-[10px] text-pink-400 hover:text-pink-600">クリア</button>
        </div>
      )}

      <div className="flex-1 overflow-auto p-3 flex flex-col gap-2">
        {messages.map((msg, i) => {
          const isUser = msg.role === "user";
          return (
            <div key={i} className={`flex flex-col ${isUser ? "items-end" : "items-start"} gap-1`}>
              {!isUser && (
                <div className="flex items-center gap-1.5">
                  <div className="w-5 h-5 rounded-full bg-gradient-to-br from-pink-500 to-rose-500 flex items-center justify-center text-[10px]">🤖</div>
                  <span className="text-[9px] text-zinc-400 font-semibold">メルカリAI</span>
                  <span className="text-[9px] text-zinc-300">{msg.time}</span>
                </div>
              )}
              {msg.text && (
                <div className={`max-w-[90%] px-3 py-2 rounded-xl text-[11px] leading-relaxed whitespace-pre-wrap ${isUser ? "bg-gradient-to-br from-pink-500 to-rose-500 text-white rounded-br-sm" : "bg-zinc-100 text-zinc-800 rounded-bl-sm"}`}>
                  {msg.text}
                </div>
              )}
              {msg.images && (
                <div className="w-full mt-1">
                  <div className="grid grid-cols-3 gap-1.5">
                    {msg.images.map(img => (
                      <button key={img.id} onClick={() => toggleImg(msg.msgId, img.id, img)}
                        className="relative aspect-square rounded-lg flex flex-col items-center justify-center gap-0.5 transition-all"
                        style={{ background: img.gradient, border: img.selected ? "2px solid #EC4899" : "2px solid transparent", boxShadow: img.selected ? "0 0 0 2px rgba(236,72,153,0.2)" : "0 1px 4px rgba(0,0,0,0.08)" }}
                      >
                        <span className="text-xl opacity-50">{img.emoji}</span>
                        <span className="text-[8px] text-zinc-500 font-medium leading-tight text-center px-1">{img.label}</span>
                        {img.selected && (
                          <div className="absolute top-1 right-1 w-4 h-4 bg-pink-500 rounded-full flex items-center justify-center text-white text-[9px] font-bold">✓</div>
                        )}
                      </button>
                    ))}
                  </div>
                  <div className="text-[9px] text-zinc-400 mt-1">クリックして選択 · 複数選択OK · 選んだ画像は③に反映されます</div>
                </div>
              )}
              {isUser && <span className="text-[9px] text-zinc-300">{msg.time}</span>}
            </div>
          );
        })}
        {loading && (
          <div className="flex items-center gap-2">
            <div className="w-5 h-5 rounded-full bg-gradient-to-br from-pink-500 to-rose-500 flex items-center justify-center text-[10px] shrink-0">🤖</div>
            <div className="bg-zinc-100 rounded-xl rounded-bl-sm px-3 py-2 flex gap-1">
              {[0,1,2].map(i => <div key={i} className="w-1.5 h-1.5 rounded-full bg-pink-400" style={{ animation: `bounce 1.2s ${i*0.2}s infinite` }} />)}
              <style>{`@keyframes bounce{0%,80%,100%{transform:scale(.5);opacity:.4}40%{transform:scale(1);opacity:1}}`}</style>
            </div>
          </div>
        )}
        <div ref={bottomRef} />
      </div>

      <div className="px-3 pb-1 shrink-0">
        <div className="flex gap-1.5 overflow-x-auto pb-1" style={{ scrollbarWidth: "none" }}>
          {QUICK_PROMPTS.map((p, i) => (
            <button key={i} onClick={() => send(p.text)} disabled={loading}
              className="flex-shrink-0 px-2.5 py-1 rounded-full bg-zinc-50 border border-zinc-200 text-[10px] font-medium text-zinc-600 hover:border-zinc-300 transition-all whitespace-nowrap"
              style={{ opacity: loading ? 0.5 : 1 }}
            >{p.label}</button>
          ))}
        </div>
      </div>

      <div className="px-3 pb-3 shrink-0">
        <div className="flex gap-2 items-end bg-zinc-50 rounded-xl px-3 py-2 border border-zinc-200">
          <textarea value={input} onChange={e => setInput(e.target.value)}
            onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }}
            placeholder="どんな画像を作りたいか入力… (Enter送信)" disabled={loading} rows={2}
            className="flex-1 bg-transparent text-[11px] text-zinc-800 resize-none outline-none leading-relaxed"
          />
          <button onClick={() => send()} disabled={!input.trim() || loading}
            className="w-7 h-7 rounded-full flex items-center justify-center text-sm shrink-0 transition-all"
            style={{ background: input.trim() && !loading ? "linear-gradient(135deg,#EC4899,#F43F5E)" : "#E2E8F0", color: input.trim() && !loading ? "#fff" : "#94A3B8" }}
          >↑</button>
        </div>
      </div>
    </div>
  );
}

// ─── PANE 3: 確認&編集 ────────────────────────────────────────
function PaneThree({ data, onChange, onSend, generatedImages }) {
  if (!data) return (
    <div className="flex flex-col h-full">
      <PaneHeader num="③" color="amber" title="確認 & 編集" subtitle="①でOKを押すと表示されます" />
      <div className="flex-1 flex flex-col items-center justify-center gap-3 p-4 text-center">
        <span className="text-5xl opacity-30">✏️</span>
        <div className="text-sm text-zinc-400">①でAI解析を実行するか<br/>②で画像を選んでください</div>
      </div>
    </div>
  );
  const charCount = data.title?.length || 0;
  return (
    <div className="flex flex-col h-full">
      <PaneHeader num="③" color="amber" title="確認 & 編集" subtitle="自由に編集してから④へ" />
      <div className="flex-1 overflow-auto flex flex-col gap-3 p-3">
        {generatedImages && generatedImages.length > 0 && (
          <div>
            <div className="text-[10px] font-semibold text-zinc-400 uppercase tracking-wider mb-1.5">②で選んだイメージ画像</div>
            <div className="flex gap-1.5 flex-wrap">
              {generatedImages.map((img, i) => (
                <div key={img.id || i} className="w-14 h-14 rounded-lg flex flex-col items-center justify-center relative" style={{ background: img.gradient }}>
                  <span className="text-xl opacity-50">{img.emoji}</span>
                  <span className="text-[7px] text-zinc-500">{img.label}</span>
                  <span className="absolute -top-1 -left-1 w-4 h-4 bg-zinc-700 text-white rounded-full text-[8px] flex items-center justify-center font-bold">{i+1}</span>
                </div>
              ))}
            </div>
          </div>
        )}

        <div className="bg-white border border-zinc-100 rounded-xl overflow-hidden">
          <div className="flex items-center gap-2 px-3 py-2 bg-zinc-50 border-b border-zinc-100">
            <span className="text-[10px] font-semibold text-zinc-500 flex-1">商品タイトル</span>
            <span className={`text-[10px] font-semibold px-1.5 py-0.5 rounded ${charCount > 40 ? "bg-red-100 text-red-600" : "bg-blue-100 text-blue-600"}`}>{charCount}/40</span>
          </div>
          <textarea className="w-full text-xs text-zinc-800 p-3 focus:outline-none resize-none leading-relaxed" rows={2} value={data.title} onChange={e => onChange({ ...data, title: e.target.value })} />
        </div>

        <div className="bg-white border border-zinc-100 rounded-xl overflow-hidden">
          <div className="px-3 py-2 bg-zinc-50 border-b border-zinc-100"><span className="text-[10px] font-semibold text-zinc-500">説明文</span></div>
          <textarea className="w-full text-xs text-zinc-800 p-3 focus:outline-none resize-none leading-relaxed" rows={6} value={data.description} onChange={e => onChange({ ...data, description: e.target.value })} />
        </div>

        <div className="bg-white border border-zinc-100 rounded-xl overflow-hidden">
          <div className="px-3 py-2 bg-zinc-50 border-b border-zinc-100"><span className="text-[10px] font-semibold text-zinc-500">価格（円）</span></div>
          <div className="flex items-center gap-2 p-3">
            <span className="text-xl font-bold text-red-500">¥</span>
            <input type="number" className="flex-1 text-xl font-bold text-red-500 focus:outline-none" value={data.price} onChange={e => onChange({ ...data, price: e.target.value })} />
          </div>
        </div>

        <div className="bg-white border border-zinc-100 rounded-xl overflow-hidden">
          <div className="px-3 py-2 bg-zinc-50 border-b border-zinc-100"><span className="text-[10px] font-semibold text-zinc-500">ハッシュタグ</span></div>
          <textarea className="w-full text-xs text-zinc-600 p-3 focus:outline-none resize-none leading-relaxed" rows={2} value={data.hashtags} onChange={e => onChange({ ...data, hashtags: e.target.value })} />
        </div>

        <button onClick={onSend} className="w-full py-3 rounded-xl bg-amber-500 text-white font-semibold text-sm flex items-center justify-center gap-2 hover:bg-amber-600 active:scale-[0.98] transition-all">
          <span>→</span><span>④ 最終確認へ送る</span>
        </button>
      </div>
    </div>
  );
}

// ─── PANE 4: 最終確認&コピー ──────────────────────────────────
function PaneFour({ data, generatedImages }) {
  const [activeImg, setActiveImg] = useState(0);
  const [editData, setEditData] = useState(null);
  useEffect(() => { if (data) setEditData(data); }, [data]);

  if (!editData) return (
    <div className="flex flex-col h-full">
      <PaneHeader num="④" color="rose" title="最終確認 & 出品" subtitle="③から送ると表示されます" />
      <div className="flex-1 flex flex-col items-center justify-center gap-3 p-4 text-center">
        <span className="text-5xl opacity-30">🛍️</span>
        <div className="text-sm text-zinc-400">③で編集を終えて<br/>「④最終確認へ送る」を押してください</div>
      </div>
    </div>
  );

  const allText = ["【商品名】", editData.title, "", "【説明文】", editData.description, "", "【価格】", editData.price + "円", "", "【ハッシュタグ】", editData.hashtags].join("\n");
  const [allCopied, copyAll] = useCopy(allText);
  const displayImages = generatedImages && generatedImages.length > 0 ? generatedImages : [
    { gradient: "linear-gradient(135deg,#EEF2FF,#E0E7FF)", emoji: "👟", label: "メイン" },
  ];

  return (
    <div className="flex flex-col h-full">
      <PaneHeader num="④" color="rose" title="最終確認 & 出品" subtitle="コピーしてメルカリへ貼るだけ" />
      <div className="flex-1 overflow-auto flex flex-col gap-3 p-3">
        <div className="bg-white border border-zinc-100 rounded-xl overflow-hidden">
          <div className="h-24 flex items-center justify-center text-4xl transition-all duration-300" style={{ background: displayImages[activeImg]?.gradient || "#f5f5f5" }}>
            <span style={{ opacity: 0.5 }}>{displayImages[activeImg]?.emoji || "🖼"}</span>
          </div>
          {displayImages.length > 1 && (
            <div className="flex gap-1 p-2 border-t border-zinc-50 overflow-x-auto">
              {displayImages.map((img, i) => (
                <button key={i} onClick={() => setActiveImg(i)} className={`flex-shrink-0 px-2 py-1 rounded text-[10px] font-medium transition-all ${activeImg === i ? "bg-zinc-800 text-white" : "bg-zinc-100 text-zinc-500 hover:bg-zinc-200"}`}>{img.label}</button>
              ))}
            </div>
          )}
        </div>

        {[
          { key: "title", label: "商品タイトル", badge: `${editData.title?.length||0}/40文字`, rows: 2 },
          { key: "description", label: "説明文", rows: 4 },
          { key: "price", label: "価格（円）", rows: 1 },
          { key: "hashtags", label: "ハッシュタグ", rows: 2 },
        ].map(({ key, label, badge, rows }) => (
          <div key={key} className="bg-white border border-zinc-100 rounded-xl overflow-hidden">
            <div className="flex items-center gap-2 px-3 py-2 bg-zinc-50 border-b border-zinc-100">
              <span className="text-[10px] font-semibold text-zinc-500 flex-1">{label}</span>
              {badge && <span className="text-[10px] bg-blue-100 text-blue-600 px-1.5 py-0.5 rounded font-medium">{badge}</span>}
              <CopyBtn text={editData[key]} small />
            </div>
            <textarea className="w-full text-xs text-zinc-800 p-3 focus:outline-none resize-none leading-relaxed" rows={rows} value={editData[key] || ""} onChange={e => setEditData({ ...editData, [key]: e.target.value })} />
          </div>
        ))}

        <div className="flex flex-col gap-2 sticky bottom-0 bg-zinc-50 pt-1 pb-2">
          <button onClick={copyAll} className={`w-full py-3 rounded-xl font-bold text-sm flex items-center justify-center gap-2 transition-all ${allCopied ? "bg-emerald-500 text-white" : "bg-zinc-900 text-white hover:bg-zinc-700"}`}>
            <span>{allCopied ? "✓" : "⎘"}</span><span>{allCopied ? "コピーしました！" : "全部まとめてコピー"}</span>
          </button>
          <a href="https://jp.mercari.com/sell" target="_blank" rel="noreferrer" className="w-full py-2.5 rounded-xl font-semibold text-sm flex items-center justify-center gap-2 bg-rose-50 text-rose-600 border border-rose-100 hover:bg-rose-100 transition-colors" style={{ textDecoration: "none" }}>
            🛍 メルカリの出品フォームを開く ↗
          </a>
        </div>
      </div>
    </div>
  );
}

function CopyBtn({ text, small }) {
  const [copied, copy] = useCopy(text);
  return (
    <button onClick={copy} className={`${small ? "inline-flex items-center gap-1 px-2 py-0.5 rounded text-xs border cursor-pointer transition-all" : "flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium border cursor-pointer transition-all"} ${copied ? "bg-emerald-50 text-emerald-600 border-emerald-200" : "bg-white text-zinc-600 border-zinc-200 hover:bg-zinc-50"}`}>
      <span>{copied ? "✓" : "⎘"}</span><span>{copied ? "コピー済" : "コピー"}</span>
    </button>
  );
}

// ─── DIVIDER ─────────────────────────────────────────────────
function Divider({ onDrag }) {
  const dragging = useRef(false);
  const onMouseDown = () => { dragging.current = true; };
  useEffect(() => {
    const onMove = e => { if (dragging.current) onDrag(e.clientX); };
    const onUp = () => { dragging.current = false; };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
    return () => { window.removeEventListener("mousemove", onMove); window.removeEventListener("mouseup", onUp); };
  }, [onDrag]);
  return (
    <div onMouseDown={onMouseDown} className="w-1 shrink-0 cursor-col-resize hover:bg-zinc-300 transition-colors flex items-center justify-center group" style={{ background: "#e5e7eb" }}>
      <div className="w-0.5 h-8 bg-zinc-300 rounded-full opacity-0 group-hover:opacity-100 transition-opacity" />
    </div>
  );
}

// ─── MAIN ────────────────────────────────────────────────────
function MercariWorkspaceV2() {
  const [analyzing, setAnalyzing] = useState(false);
  const [aiResult, setAiResult] = useState(null);
  const [pane3Data, setPane3Data] = useState(null);
  const [final, setFinal] = useState(null);
  const [generatedImages, setGeneratedImages] = useState([]);
  const [widths, setWidths] = useState([22, 28, 26, 24]);
  const containerRef = useRef();

  const handleAnalyze = () => {
    setAnalyzing(true);
    setTimeout(() => {
      setAiResult(MOCK_AI_RESULT);
      setPane3Data({ title: MOCK_AI_RESULT.titles[1], price: "3500", description: MOCK_AI_RESULT.description, hashtags: MOCK_AI_RESULT.hashtags });
      setAnalyzing(false);
    }, 2200);
  };

  const makeOnDrag = useCallback((idx) => (clientX) => {
    if (!containerRef.current) return;
    const rect = containerRef.current.getBoundingClientRect();
    setWidths(prev => {
      const next = [...prev];
      const delta = (clientX - rect.left) / rect.width * 100 - prev.slice(0, idx + 1).reduce((a, b) => a + b, 0);
      next[idx] = Math.max(15, next[idx] + delta);
      next[idx + 1] = Math.max(15, next[idx + 1] - delta);
      return next;
    });
  }, []);

  const steps = [
    { label: "画像UP", done: !!aiResult || analyzing },
    { label: "画像生成", done: generatedImages.length > 0 },
    { label: "編集", done: !!pane3Data },
    { label: "出品", done: !!final },
  ];

  return (
    <div className="flex flex-col" style={{ height: "600px", background: "#fafafa", fontFamily: "'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif" }}>
      <div className="flex items-center gap-3 px-4 py-2.5 bg-white border-b border-zinc-100 shrink-0">
        <div className="flex gap-1.5">
          <div className="w-3 h-3 rounded-full bg-red-400" />
          <div className="w-3 h-3 rounded-full bg-yellow-400" />
          <div className="w-3 h-3 rounded-full bg-green-400" />
        </div>
        <span className="text-sm font-semibold text-zinc-800">🛒 メルカリ出品ワークスペース</span>
        <div className="ml-auto flex items-center gap-2">
          {steps.map((s, i) => (
            <div key={i} className="flex items-center gap-1">
              <div className={`w-4 h-4 rounded-full flex items-center justify-center text-[9px] font-bold ${s.done ? "bg-emerald-500 text-white" : "bg-zinc-200 text-zinc-400"}`}>{s.done ? "✓" : i + 1}</div>
              <span className="text-[10px] text-zinc-500 hidden sm:inline">{s.label}</span>
              {i < 3 && <span className="text-zinc-300 text-xs">›</span>}
            </div>
          ))}
        </div>
      </div>

      <div ref={containerRef} className="flex flex-1 overflow-hidden">
        <div style={{ width: `${widths[0]}%`, minWidth: "15%", overflow: "hidden" }} className="flex flex-col border-r border-zinc-100 bg-white">
          <PaneOne onAnalyze={handleAnalyze} analyzing={analyzing} />
        </div>
        <Divider onDrag={makeOnDrag(0)} />
        <div style={{ width: `${widths[1]}%`, minWidth: "15%", overflow: "hidden" }} className="flex flex-col border-r border-zinc-100 bg-white">
          <PaneTwo onImagesGenerated={setGeneratedImages} />
        </div>
        <Divider onDrag={makeOnDrag(1)} />
        <div style={{ width: `${widths[2]}%`, minWidth: "15%", overflow: "hidden" }} className="flex flex-col border-r border-zinc-100 bg-white">
          <PaneThree data={pane3Data} onChange={setPane3Data} onSend={() => setFinal(pane3Data)} generatedImages={generatedImages} />
        </div>
        <Divider onDrag={makeOnDrag(2)} />
        <div style={{ width: `${widths[3]}%`, minWidth: "15%", overflow: "hidden" }} className="flex flex-col bg-zinc-50">
          <PaneFour data={final} generatedImages={generatedImages} />
        </div>
      </div>

      <div className="flex items-center gap-4 px-4 py-1.5 bg-white border-t border-zinc-100 shrink-0">
        <span className="text-[10px] text-zinc-400">
          {analyzing ? "⟳ AI解析中..." : aiResult ? "✓ AI解析完了" : "① 画像を選んでOKを押してください　②AIでイメージ画像を生成してください"}
        </span>
        <div className="ml-auto"><span className="text-[10px] text-zinc-300">← ドラッグで幅調整 →</span></div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<MercariWorkspaceV2 />);
  </script>
</body>
</html>
